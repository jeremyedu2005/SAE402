<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Arène Multijoueur</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at center, #000 0%, #111 50%, #000 100%);
            color: #fff;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 0, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 0, 0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        .container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff0000, #00ffff, #ffff00, #ff00ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        .team-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(20, 20, 20, 0.9));
            border: 3px solid transparent;
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .team-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: transform 0.6s;
            transform: rotate(0deg);
        }

        .team-card:hover::before {
            transform: rotate(360deg);
        }

        .team-card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 100px rgba(255, 255, 255, 0.2);
        }

        .team-card.blue:hover {
            border-color: #00ffff;
            box-shadow: 0 0 100px rgba(0, 255, 255, 0.6), 0 20px 100px rgba(0, 255, 255, 0.2);
        }

        .team-card.red:hover {
            border-color: #ff4444;
            box-shadow: 0 0 100px rgba(255, 68, 68, 0.6), 0 20px 100px rgba(255, 68, 68, 0.2);
        }

        .team-card.selected {
            border-color: currentColor;
            box-shadow: 0 0 100px currentColor;
        }

        .team-card.blue.selected {
            color: #00ffff;
        }

        .team-card.red.selected {
            color: #ff4444;
        }

        .team-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px currentColor);
            transition: transform 0.3s;
        }

        .team-card:hover .team-icon {
            transform: scale(1.2);
        }

        .team-name {
            font-size: 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: inherit;
            text-shadow: 0 0 20px currentColor;
        }

        .btn {
            margin-top: 50px;
            padding: 20px 40px;
            background: linear-gradient(45deg, #ff0000, #ff4444);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.5);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .erreur {
            margin-top: 20px;
            color: #ff4444;
            font-size: 1rem;
            text-shadow: 0 0 10px #ff4444;
            display: none;
        }

        /* Particules animées */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: float 6s linear infinite;
        }

        .particle:nth-child(odd) {
            background: #00ffff;
            animation-duration: 8s;
        }

        .particle:nth-child(3n) {
            background: #ff4444;
            animation-duration: 10s;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Particules de fond -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; animation-delay: 1s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 5s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 80%; animation-delay: 7s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 8s;"></div>

    <div class="container">
        <h1>⚔️ ARÈNE</h1>
        <p class="subtitle">Choisissez votre équipe</p>
        <div class="teams-grid">
            <div class="team-card blue" data-team="blue">
                <div class="team-icon">🔵</div>
                <div class="team-name">ÉQUIPE BLEUE</div>
            </div>
            <div class="team-card red" data-team="red">
                <div class="team-icon">🔴</div>
                <div class="team-name">ÉQUIPE ROUGE</div>
            </div>
        </div>
        <p class="erreur" id="erreur">Veuillez choisir une équipe.</p>
        <button class="btn" id="btn-suivant">SUIVANT</button>
    </div>

    <script>
        let equipeSelectionnee = null;

        // Sélection d'équipe
        document.querySelectorAll(".team-card").forEach((card) => {
            card.addEventListener("click", () => {
                document.querySelectorAll(".team-card").forEach((c) => c.classList.remove("selected"));
                card.classList.add("selected");
                equipeSelectionnee = card.dataset.team;
            });
        });

        // Bouton suivant
        document.getElementById("btn-suivant").addEventListener("click", () => {
            if (!equipeSelectionnee) {
                document.getElementById("erreur").style.display = "block";
                return;
            }
            document.getElementById("erreur").style.display = "none";
            localStorage.setItem("equipeChoisie", equipeSelectionnee);
            window.location.href = "class.html";
        });
    </script>
</body>
</html>
