<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arène Multijoueur</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="jeu.css">
</head>
<body>
    <div class="arena">
        <!-- Les personnages sont créés dynamiquement par client.js -->
    </div>
    <a href="index.html"><button id="btnDeco">Déconéctatisation</button></a>

    <script>
        // Redirige vers la connexion si pas de nom
        const nomJoueur = localStorage.getItem("nomJoueur");
        const classeChoisie = localStorage.getItem("classeChoisie");
        if (!nomJoueur || !classeChoisie) {
            window.location.href = "index.html";
        }
    </script>
    <script src="client.js"></script>
    <script>
        // Envoie rejoindre dès que le socket est connecté
        socket.on("connect", () => {
            const nomJoueur = localStorage.getItem("nomJoueur");
            const classeChoisie = localStorage.getItem("classeChoisie");
            socket.emit("rejoindre", { nomJoueur, classe: classeChoisie });
        });
    </script>
</body>
</html>
