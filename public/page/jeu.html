<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Clash</title>
    <script src="/socket.io/socket.io.js"></script>
	<link rel="icon" type="image/x-icon" href="/img/arcane_clash.ico">
    <link rel="stylesheet" href="../css/jeu.css">
</head>
<body>
    <div class="arena">
        <!-- Les personnages sont créés dynamiquement par client.js -->
    </div>
    <a href="../index.html"><button id="btnDeco">Déconnexion</button></a>

    <script>
        // Redirige vers la connexion si pas de nom
        const nomJoueur = localStorage.getItem("nomJoueur");
        const classeChoisie = localStorage.getItem("classeChoisie");
        const equipeChoisie = localStorage.getItem("equipeChoisie");
        if (!nomJoueur || !classeChoisie || !equipeChoisie) {
            window.location.href = "../index.html";
        }

        // Applique la map choisie depuis le lobby
        const mapChoisie = localStorage.getItem("mapChoisie") || "ete";
        const mapFiles = { ete: "battle_map_6.png", hiver: "battle_map_hiver.png" };
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelector(".arena").style.backgroundImage =
                `url('../img/${mapFiles[mapChoisie]}')`;
        });
    </script>
    <script src="../client.js"></script>
    <script>
        // Envoie rejoindre dès que le socket est connecté
        socket.on("connect", () => {
            const nomJoueur = localStorage.getItem("nomJoueur");
            const classeChoisie = localStorage.getItem("classeChoisie");
            const equipeChoisie = localStorage.getItem("equipeChoisie");
            socket.emit("rejoindre", { nomJoueur, classe: classeChoisie, equipe: equipeChoisie });
        });
    </script>
</body>
</html>
