<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix de Classe — Arena Clash</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/class.css">
</head>
<body>
    <div class="main-layout">
        <div class="container">
            <div class="team-header">
                <div class="team-info" id="team-info">Chargement...</div>
                <div class="team-icons" id="team-class-icons"></div>
            </div>

            <p class="subtitle">Choisissez votre classe</p>

            <div class="classes-grid">
                <div class="classe-card selected" data-classe="hero"><img src="../img/icons/hero_icon.png" alt="Héros"></div>
                <div class="classe-card" data-classe="mage_feu"><img src="../img/icons/mage_feu_icon.png" alt="Mage Feu"></div>
                <div class="classe-card" data-classe="mage_glace"><img src="../img/icons/mage_glace_icon.png" alt="Mage Glace"></div>
                <div class="classe-card" data-classe="archer"><img src="../img/icons/archer_icon.png" alt="Archer"></div>
                <div class="classe-card" data-classe="guerrier" style="display: none;"><img src="../img/icons/guerrier_icon.png" alt="Guerrier"></div>
                <div class="classe-card" data-classe="goblin"><img src="../img/icons/goblin_icon.png" alt="Goblin"></div>
            </div>

            <div class="class-detail-card" id="class-detail-card">
                <div class="detail-header">
                    <h2 id="detail-nom">HÉROS</h2>
                    <span id="detail-role">TANK / DPS</span>
                </div>

                <div class="stats-bars-v2">
                    <div class="bar-container">
                        <img src="../img/icons/stats/hp.png" class="stat-icon" alt="HP">
                        <div class="bar-wrap">
                            <div class="bar"><div id="bar-pv" class="fill-pv"></div></div>
                        </div>
                        <span class="stat-value" id="val-pv">300</span>
                    </div>
                    <div class="bar-container">
                        <img src="../img/icons/stats/res.png" class="stat-icon" alt="RES">
                        <div class="bar-wrap">
                            <div class="bar"><div id="bar-res" class="fill-res"></div></div>
                        </div>
                        <span class="stat-value" id="val-res">20</span>
                    </div>
                    <div class="bar-container">
                        <img src="../img/icons/stats/dmg.png" class="stat-icon" alt="DMG">
                        <div class="bar-wrap">
                            <div class="bar"><div id="bar-dmg" class="fill-dmg"></div></div>
                        </div>
                        <span class="stat-value" id="val-dmg">60</span>
                    </div>
                    <div class="bar-container">
                        <img src="../img/icons/stats/spd.png" class="stat-icon" alt="SPD">
                        <div class="bar-wrap">
                            <div class="bar"><div id="bar-spd" class="fill-spd"></div></div>
                        </div>
                        <span class="stat-value" id="val-spd">1.0</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="nom" placeholder="Ton pseudo..." maxlength="20" />
                <p class="erreur" id="erreur" style="display:none;">Merci d'entrer un nom.</p>
            </div>

            <div class="actions">
                <button class="btn" id="btn-connexion">ENTRER DANS L'ARÈNE</button>
                <button class="btn btn-back" id="id-back">Retour</button>
            </div>
        </div>

        <div id="info-panel" class="info-panel">
            <div class="panel-content">
                <div class="sprite-display">
                    <img src="../img/sprites/hero.png" id="class-sprite" alt="Class Sprite">
                </div>
                <h2 class="panel-title" id="panel-class-name">COMMANDES</h2>
                <div id="info-classe-details" class="ability-list"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            /* 8.1. INITIALISATION ET VARIABLES */
            const socket = io();
            let classeSelectionnee = "hero";
            const equipeChoisie = localStorage.getItem("equipeChoisie");

            /* 8.2. DONNÉES DES CLASSES */
            const classData = {
                hero: {
                    nom: "HÉROS", pv: 300, res: 20, dmg: 60, spd: 1.0, role: "Équilibré", sprite: "hero.png",
                    abilities: [
                        { name: "Coup d'épée", key: "G", desc: "Un coup puissant en arc de cercle devant vous.", icon: "sword.png" },
                        { name: "Bouclier", key: "D", desc: "Réduit les dégâts reçus et vous ralentit.", icon: "shield.png" },
                        { name: "Dash", key: "Espace", desc: "Une ruée rapide dans votre direction actuelle.", icon: "dash.png" }
                    ]
                },
                mage_feu: {
                    nom: "MAGE DE FEU", pv: 200, res: 10, dmg: 55, spd: 1.0, role: "Burst DPS", sprite: "mage_feu.png",
                    abilities: [
                        { name: "Boule de feu", key: "G", desc: "Lance un projectile enflammé qui explose à l'impact.", icon: "fireball.png" },
                        { name: "Météore", key: "D", desc: "Invoque un météore créant une zone de brûлure.", icon: "meteor.png" },
                        { name: "Téléportation", key: "Espace", desc: "Clignement instantané vers votre curseur.", icon: "teleport.png" }
                    ]
                },
                mage_glace: {
                    nom: "MAGE DE GLACE", pv: 200, res: 10, dmg: 80, spd: 1.0, role: "Control", sprite: "mage_glace.png",
                    abilities: [
                        { name: "Éclats", key: "G", desc: "Projette des pics de glace gelant les ennemis.", icon: "ice_shards.png" },
                        { name: "Laser", key: "D", desc: "Un rayon givrant continu qui traverse les cibles.", icon: "laser.png" },
                        { name: "Téléportation", key: "Espace", desc: "Déplacement spectral à travers les obstacles.", icon: "teleport.png" }
                    ]
                },
                archer: {
                    nom: "ARCHER", pv: 220, res: 12, dmg: 40, spd: 1.0, role: "Distance", sprite: "archer.png",
                    abilities: [
                        { name: "Flèche", key: "G", desc: "Tir de précision rapide sur longue distance.", icon: "arrow.png" },
                        { name: "Pluie", key: "D", desc: "Une salve de flèches tombe sur la zone ciblée.", icon: "arrow_rain.png" },
                        { name: "Esquive", key: "Espace", desc: "Un saut agile pour se repositionнер.", icon: "dash.png" }
                    ]
                },
                guerrier: {
                    nom: "GUERRIER", pv: 400, res: 30, dmg: 80, spd: 1.0, role: "Tank", sprite: "guerrier.png",
                    abilities: [
                        { name: "Frappe", key: "G", desc: "Un lourd coup fracassant les armures.", icon: "heavy_hit.png" },
                        { name: "Onde de choc", key: "D", desc: "Frappe le sol pour repousser les ennemis.", icon: "ground_slam.png" },
                        { name: "Sprint", key: "Espace", desc: "Augmente massivement la vitesse de course.", icon: "sprint.png" }
                    ]
                },
                goblin: {
                    nom: "GOBLIN", pv: 160, res: 15, dmg: 35, spd: 1.5, role: "Assassin", sprite: "goblin.png",
                    abilities: [
                        { name: "Poignard", key: "G", desc: "Coup rapide appliquant un saignement.", icon: "dagger.png" },
                        { name: "Fiole", key: "D", desc: "Lance un poison ralentissant les cibles.", icon: "poison.png" },
                        { name: "Double Dash", key: "Espace", desc: "Permет de foncer deux fois de suite.", icon: "dash.png" }
                    ]
                }
            };

            /* 8.3. LOGIQUE DE L'INTERFACE UTILISATEUR */
            const updateUI = (classe) => {
                const data = classData[classe];
                const spriteImg = document.getElementById("class-sprite");
                if (spriteImg) spriteImg.src = `../img/sprites/${data.sprite}`;

                document.getElementById("class-detail-card").style.backgroundImage = `url('../img/${classe}_banner.png')`;

                document.getElementById("panel-class-name").textContent = data.nom;
                document.getElementById("detail-nom").textContent = data.nom;
                document.getElementById("detail-role").textContent = data.role;
                document.getElementById("val-pv").textContent = data.pv;
                document.getElementById("val-res").textContent = data.res;
                document.getElementById("val-dmg").textContent = data.dmg;
                document.getElementById("val-spd").textContent = data.spd.toFixed(1);

                document.getElementById("bar-pv").style.width = (data.pv / 400 * 100) + "%";
                document.getElementById("bar-res").style.width = (data.res / 30 * 100) + "%";
                document.getElementById("bar-dmg").style.width = (data.dmg / 100 * 100) + "%";
                document.getElementById("bar-spd").style.width = (data.spd / 1.5 * 100) + "%";

                const detailsContainer = document.getElementById("info-classe-details");
                detailsContainer.innerHTML = "";
                data.abilities.forEach(abi => {
                    const abiItem = document.createElement("div");
                    abiItem.className = "ability-item";
                    abiItem.innerHTML = `
                        <div class="ability-header">
                            <img src="../img/icons/abilities/${abi.icon}" class="ability-icon" alt="${abi.name}">
                            <span class="ability-name">${abi.name} <span class="ability-key">[${abi.key}]</span></span>
                        </div>
                        <div class="ability-desc">${abi.desc}</div>
                    `;
                    detailsContainer.appendChild(abiItem);
                });
            };

            /* 8.4. GESTION DES ÉVÉNEMENTS ET RÉSEAU */
            if (!equipeChoisie) { window.location.href = "../index.html"; return; }
            document.querySelector('.main-layout').setAttribute('data-team', equipeChoisie);
            document.getElementById("team-info").textContent = `ÉQUIPE : ${equipeChoisie.toUpperCase()}`;

            socket.emit("rejoindre_equipe", { equipe: equipeChoisie, classe: classeSelectionnee });

            socket.on("membres_equipe", (membres) => {
                const icons = document.getElementById("team-class-icons");
                if (icons) {
                    icons.innerHTML = "";
                    membres.forEach(m => {
                        const iconWrapper = document.createElement("div");
                        iconWrapper.className = "mini-icon";
                        const img = document.createElement("img");
                        const characterClass = m.classe || 'hero';
                        img.src = `../img/icons/${characterClass}_icon.png`;
                        img.style.width = "100%"; img.style.height = "100%";
                        img.style.objectFit = "contain"; img.style.imageRendering = "pixelated";
                        iconWrapper.appendChild(img);
                        icons.appendChild(iconWrapper);
                    });
                }
            });

            document.querySelectorAll(".classe-card").forEach(card => {
                card.addEventListener("click", () => {
                    document.querySelectorAll(".classe-card").forEach(c => c.classList.remove("selected"));
                    card.classList.add("selected");
                    classeSelectionnee = card.dataset.classe;
                    updateUI(classeSelectionnee);
                    socket.emit("update_lobby_classe", { classe: classeSelectionnee });
                });
                card.addEventListener("mouseenter", () => updateUI(card.dataset.classe));
                card.addEventListener("mouseleave", () => updateUI(classeSelectionnee));
            });

            document.getElementById("btn-connexion").addEventListener("click", () => {
                const nom = document.getElementById("nom").value.trim();
                if (!nom) { document.getElementById("erreur").style.display = "block"; return; }
                localStorage.setItem("nomJoueur", nom);
                localStorage.setItem("classeChoisie", classeSelectionnee);
                socket.emit("rejoindre", { nomJoueur: nom, classe: classeSelectionnee, equipe: equipeChoisie });
            });

            socket.on("rejoindre_ok", () => window.location.href = "jeu.html");
            document.getElementById("id-back").addEventListener("click", () => window.location.href = "../index.html");

            updateUI(classeSelectionnee);
        });
    </script>
</body>
</html>
