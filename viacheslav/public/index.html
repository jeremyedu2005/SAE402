<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcane Clash</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 8s;"></div>

    <div class="container">
        <img src="img/arcane_clash.png" alt="Logo" class="main-logo" id="main-logo">
        <h1 id="vanishing-h1">Arcane Clash</h1>
        <p class="subtitle" id="vanishing-subtitle">Choisissez votre équipe</p>
    </div>

    <div class="corner-glow blue-corner" id="blue-corner" data-team="blue">
        <span class="team-label">EQUIPE BLEU</span>
    </div>

    <div class="corner-glow red-corner" id="red-corner" data-team="red">
        <span class="team-label">EQUIPE ROUGE</span>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
